<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boreal</title>
  <link href="https://fonts.googleapis.com/css2?family=Calistoga&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #f5f3f0;
      --dim: rgba(245, 243, 240, 0.55);
      --faint: rgba(245, 243, 240, 0.45);
    }

    html, body {
      background: #000;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* ── grain ── */
    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    /* ── vignette ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* ── layout ── */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 24px;
      position: relative;
      z-index: 5;
      min-height: 100vh;
    }

    .logo {
      width: min(800px, 90vw);
      display: flex;
      justify-content: center;
      margin-bottom: 64px;
    }

    .logo img {
      width: min(18vw, 200px);
      min-width: 120px;
      display: block;
    }

    /* ── video ── */
    .video-wrap {
      width: min(800px, 90vw);
      aspect-ratio: 16 / 9;
      position: relative;
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── caption row below video ── */
    .caption {
      width: min(800px, 90vw);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-top: 16px;
      gap: 24px;
    }

    .set-title {
      font-family: 'Calistoga', serif;
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--white);
      flex-shrink: 0;
    }

    .set-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.55rem, 1vw, 0.63rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--dim);
      line-height: 2;
      text-align: right;
      text-transform: lowercase;
    }

    /* ── tags ── */
    .tags {
      width: min(800px, 90vw);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: var(--dim);
      border: 1px solid rgba(245, 243, 240, 0.2);
      padding: 4px 10px;
      border-radius: 0;
    }

    /* ── footer ── */
    .footer {
      margin-top: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-bottom: 48px;
    }

    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--faint);
      text-align: center;
    }

    .credits {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(245, 243, 240, 0.35);
      text-align: center;
    }

    /* ── mobile ── */
    @media (max-width: 600px) {
      .logo img { width: 100%; }
      .page { padding-top: 60px; padding-bottom: 100px; }
    }
  </style>
</head>
<body>

  <canvas id="grain"></canvas>

  <div class="page">
    <div class="logo">
      <img src="boreal.jpeg" alt="boreal">
    </div>

    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/ABPIZK9na9I?rel=0&modestbranding=1&color=white"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <div class="caption">
      <h1 class="set-title">boreal_01 percy thrills</h1>
      <div class="set-meta">
        rotterdam noord<br>
        06.03.2026
      </div>
    </div>

    <div class="tags">
      <span class="tag">disco</span>
      <span class="tag">house</span>
      <span class="tag">soul</span>
    </div>

    <div class="video-wrap" style="margin-top: 80px;">
      <iframe
        src="https://www.youtube.com/embed/QZ7tWhQMsgs?rel=0&modestbranding=1&color=white"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <div class="caption">
      <h1 class="set-title">boreal_02 petsq</h1>
      <div class="set-meta">
        rotterdam noord<br>
        06.03.2026
      </div>
    </div>

    <div class="tags">
      <span class="tag">electronica</span>
      <span class="tag">house</span>
      <span class="tag">ambient</span>
    </div>

    <div class="footer">
      <p class="tagline">dj sets. striking locations. ongoing.</p>
      <p class="credits">by percy thrills &amp; petsq</p>
      <img src="boreal_footer.jpeg" alt="boreal" style="width: 300px; margin-top: 24px; opacity: 0.7;">
    </div>
  </div>

  <script>
    // ── film grain ──
    const canvas = document.getElementById('grain');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let lastGrain = 0;
    function drawGrain(ts) {
      if (ts - lastGrain > 50) {
        lastGrain = ts;
        const id   = ctx.createImageData(canvas.width, canvas.height);
        const data = id.data;
        for (let i = 0; i < data.length; i += 4) {
          const v = Math.random() * 255 | 0;
          data[i] = data[i+1] = data[i+2] = v;
          data[i+3] = 8;
        }
        ctx.putImageData(id, 0, 0);
      }
      requestAnimationFrame(drawGrain);
    }
    requestAnimationFrame(drawGrain);
  </script>
</body>
</html>
